# Cloud Run env config: stubs and Secret Manager links
# Use with: gcloud run deploy ... --env-vars-file deploy/env.prod.yaml --set-secrets ...
# Replace stub values; secrets are loaded from Google Secret Manager (see secrets-to-create.md).
# Any file in deploy/ that contains real secret values must be encrypted with SOPS.

# --- Plain env vars (stubs — replace with your values) ---
env:
  PORT: "8080"
  ALLOWED_ORIGINS: "https://code-commenter-web-PROJECT_NUMBER.REGION.run.app"
  AUTH_CALLBACK_URL: "https://code-commenter-api-PROJECT_NUMBER.REGION.run.app/auth/callback"
  S3_BUCKET: ""
  S3_REGION: "eu-central-1"
  S3_ENDPOINT: ""
  GEMINI_MODEL: "gemini-3-flash-preview"
  GEMINI_LIVE_MODEL: "gemini-2.5-flash-native-audio-preview-12-2025"
  GEMINI_TTS_MODEL: "gemini-2.5-flash-preview-tts"
  TIMESTAMP_MODEL: "gemini-2.5-flash"
  FIRESTORE_PROJECT_ID: ""
  FIRESTORE_DATABASE_ID: ""
  DATASTORE_PROJECT_ID: ""
  DATASTORE_DATABASE_ID: ""
  GOOGLE_CLIENT_ID: ""
  DISABLE_AUTH: ""

# --- Secret Manager links (use with gcloud --set-secrets=VAR=secret-name:latest) ---
# Create these secrets in Google Cloud (see secrets-to-create.md), then reference as:
#   projects/PROJECT_ID/secrets/SECRET_NAME/versions/latest
secrets:
  GEMINI_API_KEY: code-commenter-gemini-api-key
  GOOGLE_CLIENT_SECRET: code-commenter-google-client-secret
  SESSION_SECRET: code-commenter-session-secret
  S3_ACCESS_KEY: code-commenter-s3-access-key
  S3_SECRET_KEY: code-commenter-s3-secret-key
