services:
  api:
    build: ./api
    ports:
      - "8090:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ALLOWED_ORIGINS=http://localhost:3010

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8090}
    ports:
      - "3010:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8090
    depends_on:
      - api
