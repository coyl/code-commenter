<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded-square background -->
  <rect width="32" height="32" rx="7" fill="#09090b"/>

  <!-- Subtle inner glow ring -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#22d3ee" stroke-width="0.6" opacity="0.18"/>

  <!-- Left bracket -->
  <polyline
    points="11,10 5.5,16 11,22"
    fill="none"
    stroke="url(#cyan)"
    stroke-width="2.4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Right bracket -->
  <polyline
    points="21,10 26.5,16 21,22"
    fill="none"
    stroke="url(#cyan)"
    stroke-width="2.4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Play triangle -->
  <polygon points="13,12.5 21.5,16 13,19.5" fill="url(#cyan)"/>
</svg>
